name: rq_mobile
description: Mobile client for RQ app.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  firebase_core: ^3.13.0
  firebase_messaging: ^15.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo-rqdf-white.png
